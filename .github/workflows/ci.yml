name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # swift-tools-version 6.3 → nécessite un Xcode récent (macOS 26).
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test
